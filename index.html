<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRYHOLE — Pick a Side</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        primary: '#22d3ee'
      }
    }
  }
}
</script>

<style>
body { transition: all 0.3s ease; }
.glow-up { box-shadow: 0 0 40px rgba(34,211,238,0.6); }
.glow-down { box-shadow: 0 0 40px rgba(239,68,68,0.6); }
</style>
</head>

<body class="bg-slate-900 text-white">

<!-- NAVBAR -->
<header class="fixed top-0 w-full z-50 bg-transparent" id="nav">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between">
    <h1 class="font-bold text-lg">DRYHOLE</h1>

    <button id="themeToggle">🌙</button>
  </div>
</header>

<!-- HERO -->
<section class="min-h-screen flex flex-col items-center justify-center text-center px-6">
  <h1 class="text-5xl font-bold mb-4 bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
    PICK A SIDE
  </h1>

  <p class="text-gray-400 mb-8">
    You don't trade. You choose. You win — or get drilled.
  </p>

  <button onclick="enterArena()" class="bg-cyan-400 text-black px-6 py-3 rounded-lg hover:scale-105">
    ENTER ARENA
  </button>
</section>

<!-- ARENA -->
<section id="arena" class="hidden py-20 px-6 text-center">

  <h2 class="text-3xl mb-6">UP or DOWN?</h2>

  <!-- TIMER -->
  <div class="text-xl mb-4">
    Round ends in: <span id="timer">60</span>s
  </div>

  <!-- POOL -->
  <div class="flex justify-center gap-10 mb-6">
    <div>
      <div class="text-green-400 text-xl">UP</div>
      <div id="upPool">0</div>
    </div>

    <div>
      <div class="text-red-400 text-xl">DOWN</div>
      <div id="downPool">0</div>
    </div>
  </div>

  <!-- INPUT -->
  <input id="amount" type="number" placeholder="Amount"
    class="p-3 rounded bg-slate-800 mb-4 w-40 text-center"/>

  <!-- BUTTONS -->
  <div class="flex justify-center gap-6">
    <button onclick="bet('up')" class="bg-green-500 px-6 py-3 rounded-lg hover:scale-105">
      UP 📈
    </button>

    <button onclick="bet('down')" class="bg-red-500 px-6 py-3 rounded-lg hover:scale-105">
      DOWN 📉
    </button>
  </div>

  <!-- RESULT -->
  <div id="result" class="mt-8 text-lg"></div>

  <!-- LOG -->
  <div id="log" class="mt-6 max-w-md mx-auto text-left text-sm opacity-70"></div>

</section>

<script>

/* THEME */
const toggle = document.getElementById('themeToggle')
toggle.onclick = () => {
  document.documentElement.classList.toggle('dark')
  localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light'
}
if(localStorage.theme === 'light') document.documentElement.classList.remove('dark')

/* ENTER */
function enterArena(){
  document.getElementById('arena').classList.remove('hidden')
  window.scrollTo({ top: document.getElementById('arena').offsetTop, behavior: 'smooth' })
}

/* GAME STATE */
let upPool = 0
let downPool = 0
let time = 60
let userBet = null

/* TIMER LOOP */
setInterval(() => {
  time--
  document.getElementById('timer').innerText = time

  if(time <= 0){
    resolveRound()
    time = 60
  }
},1000)

/* BET */
function bet(side){
  const amt = parseInt(document.getElementById('amount').value)
  if(!amt) return alert("Enter amount")

  userBet = side

  if(side === 'up') upPool += amt
  else downPool += amt

  updatePool()

  log(`You bet ${amt} on ${side.toUpperCase()}`)
}

/* UPDATE */
function updatePool(){
  document.getElementById('upPool').innerText = upPool
  document.getElementById('downPool').innerText = downPool
}

/* LOG */
function log(msg){
  const el = document.getElementById('log')
  el.innerHTML += `<div>> ${msg}</div>`
  el.scrollTop = el.scrollHeight
}

/* RESOLVE */
function resolveRound(){

  const result = Math.random() > 0.5 ? 'up' : 'down'
  const resEl = document.getElementById('result')

  if(userBet === result){
    resEl.innerHTML = "🟢 YOU WIN"
    document.body.classList.add('glow-up')
    setTimeout(()=> document.body.classList.remove('glow-up'),1000)
  } else {
    resEl.innerHTML = "💀 YOU GOT DRILLED"
    document.body.classList.add('glow-down')
    setTimeout(()=> document.body.classList.remove('glow-down'),1000)
  }

  log(`Round result: ${result.toUpperCase()}`)

  upPool = 0
  downPool = 0
  userBet = null
  updatePool()
}

</script>

</body>
</html>
