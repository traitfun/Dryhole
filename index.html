<!DOCTYPE html>
<html>
<head>
  <title>DRYHOLE x402</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center h-screen">

<div class="text-center">
  <h1 class="text-3xl mb-6 font-bold">DRYHOLE x402</h1>

  <div class="mb-4">
    Balance: <span id="balance">0</span>
  </div>

  <div class="mb-6 text-xl" id="result">
    Ready to drill...
  </div>

  <button onclick="drill()"
    class="bg-purple-600 hover:bg-purple-800 px-8 py-4 rounded-xl text-lg">
    DRILL ($0.001)
  </button>

  <div class="mt-4">
    <button onclick="double()"
      class="bg-red-600 px-6 py-2 rounded-lg">
      DOUBLE OR NOTHING
    </button>
  </div>
</div>

<script>
let balance = 0;
let lastReward = 0;

async function drill() {
  const res = await fetch("/drill", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-paid": "true" // simulate payment
    }
  });

  const data = await res.json();

  if (data.result === "lose") {
    document.getElementById("result").innerText = "💀 RUGGED";
    lastReward = 0;
  }

  if (data.result === "win") {
    document.getElementById("result").innerText =
      "✅ WIN +" + data.reward;
    lastReward = data.reward;
    balance += data.reward;
  }

  if (data.result === "jackpot") {
    document.getElementById("result").innerText =
      "💥 JACKPOT +" + data.reward;
    lastReward = data.reward;
    balance += data.reward;
  }

  document.getElementById("balance").innerText = balance;
}

async function double() {
  if (lastReward <= 0) return;

  const win = Math.random() < 0.5;

  if (win) {
    lastReward *= 2;
    balance += lastReward;
    document.getElementById("result").innerText =
      "🔥 DOUBLE SUCCESS +" + lastReward;
  } else {
    balance -= lastReward;
    document.getElementById("result").innerText =
      "💀 LOST EVERYTHING";
    lastReward = 0;
  }

  document.getElementById("balance").innerText = balance;
}
</script>

</body>
</html>
